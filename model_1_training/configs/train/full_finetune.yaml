# Training configuration for Model 1 — Full Fine-tuning

# Output
output_dir: "outputs/checkpoints"

# Hyperparameters
learning_rate: 2.0e-5
per_device_train_batch_size: 32
per_device_eval_batch_size: 64
num_train_epochs: 10
weight_decay: 0.01
warmup_ratio: 0.1

# Scheduler
lr_scheduler_type: "cosine"

# Gradient
max_grad_norm: 1.0
gradient_accumulation_steps: 1

# Evaluation strategy
eval_strategy: "epoch"
save_strategy: "epoch"
load_best_model_at_end: true
metric_for_best_model: "eval_macro_f1"
greater_is_better: true
save_total_limit: 3

# Logging
logging_steps: 50
report_to: "wandb"

# Reproducibility
seed: 42
dataloader_num_workers: 4

# Early stopping patience (epochs)
early_stopping_patience: 3

# Focal loss (overrides default CE in Trainer)
use_focal_loss: true
focal_gamma: 2.0

# Validation threshold — block deployment if below
min_macro_f1: 0.90
