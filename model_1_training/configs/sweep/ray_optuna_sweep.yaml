# Hyperparameter sweep configuration — Ray Tune + Optuna (Bayesian)
# Used by: model_1_training/scripts/run_sweep.py

method: bayesian   # Optuna TPE sampler

metric:
  name: eval_macro_f1
  goal: maximize

num_trials: 20
gpus_per_trial: 1
cpus_per_trial: 4

# Search space
search_space:
  learning_rate:
    type: log_uniform
    min: 1.0e-5
    max: 5.0e-5

  per_device_train_batch_size:
    type: choice
    values: [16, 32, 64]

  weight_decay:
    type: uniform
    min: 0.01
    max: 0.1

# Fixed during sweep
fixed:
  num_train_epochs: 5
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  use_focal_loss: true
  focal_gamma: 2.0

# Early termination (ASHA scheduler)
scheduler:
  type: asha
  max_t: 5
  grace_period: 2
  reduction_factor: 2

# W&B integration
wandb_project: "automend-model1"
