# W&B Hyperparameter Sweep — AutoMend Track B (Qwen2.5 LoRA SFT)
#
# Objective: find the best non-RAG checkpoint by sweeping LoRA rank,
# learning rate, and batch configuration on the locked gold benchmark.
#
# Run:
#   1. Initialize:  wandb sweep configs/sweep/wandb_sweep.yaml
#   2. Launch agent: wandb agent <entity>/<project>/<sweep_id>
#
# Each sweep run calls scripts/run_sweep.py, which trains a model with
# the suggested hyperparameters and scores it on the gold benchmark.

program: model_2_training/scripts/run_sweep.py
project: automend-model2
method: bayes          # Bayesian optimization — efficient for ~10–30 runs

metric:
  name: benchmark/tax_valid_rate   # primary: fraction of outputs with valid schema
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 1
  eta: 2

parameters:
  # ─── Learning rate ────────────────────────────────────────────────────────
  learning_rate:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 5.0e-4

  # ─── LoRA rank and alpha ──────────────────────────────────────────────────
  lora_r:
    values: [8, 16, 32, 64]

  lora_alpha:
    values: [16, 32, 64]           # usually 2× lora_r; sweep lets us confirm

  lora_dropout:
    values: [0.0, 0.05, 0.1]

  # ─── Batch / gradient accumulation ───────────────────────────────────────
  per_device_train_batch_size:
    values: [1, 2, 4]

  gradient_accumulation_steps:
    values: [4, 8, 16]             # effective batch = batch × accum

  # ─── LR schedule ─────────────────────────────────────────────────────────
  lr_scheduler_type:
    values: ["cosine", "linear", "constant_with_warmup"]

  warmup_ratio:
    values: [0.03, 0.05, 0.10]

  # ─── Epochs (keep small for sweep efficiency) ─────────────────────────────
  num_train_epochs:
    values: [1, 2, 3]

  # ─── Weight decay ─────────────────────────────────────────────────────────
  weight_decay:
    values: [0.0, 0.01, 0.1]
