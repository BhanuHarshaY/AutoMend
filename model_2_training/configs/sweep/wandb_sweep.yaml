# W&B Hyperparameter Sweep — AutoMend Track B (Qwen2.5-1.5B LoRA SFT)
#
# Aggressive sweep: only learning_rate and lora_r are searched.
# Everything else is fixed to known-good defaults for a 1.5B model.
# Bayes converges in ~5-8 trials with this tight search space.
#
# Run:
#   1. Initialize:  wandb sweep configs/sweep/wandb_sweep.yaml
#   2. Launch agent: wandb agent <entity>/<project>/<sweep_id>
#
# Each sweep run calls scripts/run_sweep.py, which trains a model with
# the suggested hyperparameters and scores it on the gold benchmark.
#
# NOTE: lora_alpha is NOT swept — run_sweep.py must set alpha = 2 × lora_r.

program: model_2_training/scripts/run_sweep.py
project: automend-model2
method: bayes          # Bayesian optimization — converges in 5-8 trials

metric:
  name: benchmark/tax_valid_rate   # primary: fraction of outputs with valid schema
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 1
  eta: 2

parameters:
  # ─── Swept: these two move the needle most ──────────────────────────────
  learning_rate:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 5.0e-4

  lora_r:
    values: [4, 8, 16]

  # ─── Fixed: known-good defaults for 1.5B model ─────────────────────────
  lora_dropout:
    value: 0.05

  per_device_train_batch_size:
    value: 1

  gradient_accumulation_steps:
    value: 8                       # effective batch = 1 × 8 = 8

  lr_scheduler_type:
    value: "cosine"

  warmup_ratio:
    value: 0.05

  num_train_epochs:
    value: 3

  weight_decay:
    value: 0.01
