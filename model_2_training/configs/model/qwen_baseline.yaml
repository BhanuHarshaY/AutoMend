# HuggingFace model name
model_name: "Qwen/Qwen2.5-1.5B-Instruct"

# Tokenizer (usually same as model)
tokenizer_name: "Qwen/Qwen2.5-1.5B-Instruct"

# Quantization: null, "4bit", or "8bit"
quantization: "4bit"

# Device map for model loading
device_map: "auto"

# LoRA target modules for Qwen architecture
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# Number of transformer layers to apply LoRA to (counting from the last).
# Qwen2.5-1.5B has 28 layers total.
#   16 → last 16 layers only (matches MLX default, fewer trainable params)
#   null → all layers (more capacity, default PEFT behaviour)
lora_layers: 16
